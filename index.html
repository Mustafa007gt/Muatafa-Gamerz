<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mustafa Gamerz</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
background:#0d1117;
color:white;
}

header{
background:#161b22;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
z-index:100;
}

.logo{
font-size:28px;
font-weight:bold;
color:#00c3ff;
}

.telegram{
background:#0088cc;
padding:10px 20px;
border-radius:8px;
color:white;
text-decoration:none;
}

.hero{
height:300px;
background:url('https://images.unsplash.com/photo-1542751371-adc38448a05e') center/cover;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
background:rgba(0,0,0,0.6);
padding:15px 25px;
border-radius:10px;
}

.search{
padding:20px;
text-align:center;
}

.search input{
width:80%;
max-width:500px;
padding:12px;
border:none;
border-radius:10px;
}

.games{
padding:30px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:#161b22;
border-radius:15px;
overflow:hidden;
transition:0.3s;
}

.card:hover{
transform:translateY(-8px);
}

.card img{
width:100%;
height:250px;
object-fit:cover;
}

.card-content{
padding:15px;
text-align:center;
}

.card-content h3{
margin-bottom:10px;
}

.download{
display:inline-block;
padding:10px 20px;
background:#00c853;
color:white;
text-decoration:none;
border-radius:8px;
}

footer{
background:#161b22;
text-align:center;
padding:20px;
margin-top:30px;
}
</style>

</head>
<body>

<header>
<div class="logo">Mustafa Gamerz</div>

<a class="telegram" href="https://t.me/mustafaGWZ">
Telegram
</a>
</header>

<section class="hero">
<h1>أفضل ألعاب الأندرويد والكمبيوتر</h1>
</section>

<div class="search">
<input type="text" placeholder="ابحث عن لعبة...">
</div>

<section class="games">

<div class="card">
<img src="https://via.placeholder.com/400x500" alt="">
<div class="card-content">
<h3>GTA San Andreas</h3>
<a href="#" class="download">تحميل</a>
</div>
</div>

<div class="card">
<img src="https://via.placeholder.com/400x500" alt="">
<div class="card-content">
<h3>Resident Evil 4</h3>
<a href="#" class="download">تحميل</a>
</div>
</div>

<div class="card">
<img src="https://via.placeholder.com/400x500" alt="">
<div class="card-content">
<h3>God of War 2</h3>
<a href="#" class="download">تحميل</a>
</div>
</div>

</section>

<footer>
© 2026 Mustafa Gamerz
</footer>

</body>
</html>
